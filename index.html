<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Information Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Using Marked for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <div class="logo-icon">🤖</div>
                <div class="logo-text">
                    <h1>Team Assistant</h1>
                    <p>AI Powered Information Desk</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="clear-chat" class="settings-btn" style="margin-right: 8px;">🗑️ Clear</button>
                <a href="admin.html" class="settings-btn" style="text-decoration: none;">🔐 Admin</a>
            </div>
        </header>

        <main id="chat-messages">
            <!-- Messages will appear here -->
            <div class="message bot-message">
                Hello! I am your team assistant. I can help you with course details, tracker links, deadlines, and more.
            </div>
        </main>

        <footer class="input-container">
            <div id="quick-replies" class="quick-replies"></div>
            <form id="chat-form" class="input-wrapper">
                <input type="text" id="user-input" placeholder="Ask me anything about the team..." autocomplete="off">
                <button type="submit" class="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <script src="firebase-config.js"></script>
    <script src="app.js" type="module"></script>
</body>

</html>
